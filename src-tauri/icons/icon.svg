<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="runner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern (map reference) -->
  <g opacity="0.08" stroke="#fff" stroke-width="2" fill="none">
    <line x1="80" y1="80" x2="80" y2="432"/>
    <line x1="160" y1="80" x2="160" y2="432"/>
    <line x1="240" y1="80" x2="240" y2="432"/>
    <line x1="320" y1="80" x2="320" y2="432"/>
    <line x1="400" y1="80" x2="400" y2="432"/>
    <line x1="80" y1="140" x2="432" y2="140"/>
    <line x1="80" y1="220" x2="432" y2="220"/>
    <line x1="80" y1="300" x2="432" y2="300"/>
    <line x1="80" y1="380" x2="432" y2="380"/>
  </g>
  
  <!-- Running figure -->
  <g transform="translate(160, 120) scale(1.1)" fill="url(#runner)">
    <!-- Head -->
    <circle cx="120" cy="50" r="32"/>
    <!-- Body -->
    <path d="M108 80 Q100 120 95 155 L115 155 Q118 120 125 85 Z" stroke-linejoin="round"/>
    <!-- Left arm (forward) -->
    <path d="M115 95 L155 70 L160 82 L122 105 Z" stroke-linejoin="round"/>
    <!-- Right arm (back) -->
    <path d="M105 100 L60 135 L55 123 L98 90 Z" stroke-linejoin="round"/>
    <!-- Left leg (forward stride) -->
    <path d="M105 150 L145 230 L165 270 L148 275 L130 240 L95 165 Z" stroke-linejoin="round"/>
    <!-- Right leg (back stride) -->
    <path d="M110 150 L65 240 L45 280 L62 285 L80 245 L115 160 Z" stroke-linejoin="round"/>
    <!-- Left foot -->
    <path d="M148 275 L175 272 L178 284 L145 287 Z"/>
    <!-- Right foot -->
    <path d="M62 285 L35 282 L32 294 L65 297 Z"/>
  </g>
  
  <!-- Map pin overlay -->
  <g transform="translate(330, 280)">
    <path d="M0 -60 C-33 -60 -60 -33 -60 0 C-60 40 0 90 0 90 C0 90 60 40 60 0 C60 -33 33 -60 0 -60 Z" fill="#ef4444" opacity="0.95"/>
    <circle cx="0" cy="-5" r="22" fill="#fff"/>
  </g>
  
  <!-- Speed lines -->
  <g opacity="0.3" stroke="#fff" stroke-width="3" stroke-linecap="round">
    <line x1="70" y1="200" x2="30" y2="200"/>
    <line x1="75" y1="230" x2="20" y2="230"/>
    <line x1="80" y1="260" x2="40" y2="260"/>
  </g>
  
  <!-- Small "UMT" text at bottom -->
  <text x="256" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="rgba(255,255,255,0.9)" letter-spacing="8">UMT</text>
</svg>
